<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raaga — Indian Music Player 🎵</title>
<style>
/* ═══════════════════════════════════════
   RAAGA — INDIAN MUSIC PLAYER
   Beautiful Deep Purple & Rose Theme
═══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:      #09091a;
  --bg2:     #0e0e24;
  --bg3:     #13132e;
  --card:    #161630;
  --card2:   #1c1c3a;
  --card3:   #222245;
  --acc:     #c084fc;   /* violet */
  --acc2:    #a855f7;
  --acc3:    #f472b6;   /* pink */
  --acc4:    #fb7185;   /* rose */
  --glow:    rgba(192,132,252,.25);
  --txt:     #f0e6ff;
  --txt2:    #a89bc2;
  --txt3:    #5a4f72;
  --brd:     #2a2050;
  --grn:     #4ade80;
  --ylw:     #fbbf24;
  --blu:     #60a5fa;
}
.lm{
  --bg:#faf5ff;--bg2:#f3e8ff;--bg3:#ede9fe;
  --card:#fff;--card2:#faf5ff;--card3:#f3e8ff;
  --acc:#9333ea;--acc2:#7c3aed;--acc3:#db2777;--acc4:#e11d48;
  --glow:rgba(147,51,234,.15);
  --txt:#1e1b4b;--txt2:#4c1d95;--txt3:#a78bfa;
  --brd:#ddd6fe;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--txt);
  transition:background .3s,color .3s;
}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;flex-direction:column}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:235px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}
.player-bar{background:var(--bg2);border-top:1px solid var(--brd);padding:10px 20px;flex-shrink:0}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--txt3)}

/* ── SIDEBAR ── */
.sb-logo{padding:15px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--acc),var(--acc3));
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 4px 14px var(--glow);
}
.sb-brand{display:flex;flex-direction:column}
.sb-name{
  font-size:18px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--acc),var(--acc3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sb-tag{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;margin-top:1px}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0 10px}
.sb-section{padding:12px 16px 4px;font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1.8px;display:flex;align-items:center;justify-content:space-between}
.sb-new-pl{cursor:pointer;font-size:17px;color:var(--txt3);line-height:1;transition:color .15s;border:none;background:none;padding:1px 3px;border-radius:4px}
.sb-new-pl:hover{color:var(--acc)}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  border-radius:10px;margin:2px 8px;
  font-size:13px;color:var(--txt2);
  transition:all .15s;user-select:none;position:relative;
}
.sb-item:hover{background:var(--card3);color:var(--txt)}
.sb-item.act{
  background:linear-gradient(135deg,rgba(192,132,252,.18),rgba(244,114,182,.12));
  color:var(--acc);font-weight:600;
  box-shadow:inset 0 0 0 1px rgba(192,132,252,.25);
}
.sb-item .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.pl-badge{font-size:10px;color:var(--txt3);margin-left:auto;background:var(--card3);padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.pl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── EQ ── */
.eq-zone{padding:8px 14px 12px;border-top:1px solid var(--brd);margin-top:auto}
.eq-title{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px}
.eq-bands{display:flex;gap:10px;align-items:flex-end;height:64px}
.eq-band{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.eq-slid{
  writing-mode:vertical-lr;direction:rtl;
  -webkit-appearance:none;appearance:none;
  width:4px;height:48px;background:var(--card3);border-radius:2px;cursor:pointer;outline:none;
}
.eq-slid::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--acc);border-radius:50%;box-shadow:0 0 6px var(--glow)}
.eq-slid::-moz-range-thumb{width:11px;height:11px;background:var(--acc);border-radius:50%;border:none}
.eq-lbl{font-size:9px;color:var(--txt3);text-align:center}

/* ── TOPBAR ── */
.search-box{flex:1;position:relative;max-width:400px}
.search-box input{
  width:100%;background:var(--card);border:1px solid var(--brd);
  border-radius:22px;padding:8px 16px 8px 36px;
  color:var(--txt);font-size:13px;outline:none;transition:border .2s,box-shadow .2s;
}
.search-box input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow)}
.search-box input::placeholder{color:var(--txt3)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:15px;pointer-events:none}
.tb-right{display:flex;gap:6px;margin-left:auto;align-items:center}
.tb-btn{
  width:34px;height:34px;border:1px solid var(--brd);background:var(--card);
  border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--txt2);transition:all .15s;
}
.tb-btn:hover{background:var(--card3);color:var(--txt);border-color:var(--txt3)}
.tb-btn.on{color:var(--acc);border-color:var(--acc);background:rgba(192,132,252,.1)}

/* ── GENRE CHIPS ── */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{
  padding:5px 14px;border-radius:22px;
  border:1px solid var(--brd);background:transparent;
  color:var(--txt3);font-size:11px;cursor:pointer;transition:all .15s;user-select:none;
}
.chip:hover{border-color:var(--acc);color:var(--acc)}
.chip.on{background:linear-gradient(135deg,var(--acc),var(--acc3));border-color:transparent;color:#fff;box-shadow:0 4px 12px var(--glow)}

/* ── VIEW TOGGLE ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-ttl{font-size:16px;font-weight:800;color:var(--txt);display:flex;align-items:center;gap:8px}
.sec-sub{font-size:11px;color:var(--txt3);font-weight:400;margin-left:4px}
.view-tog{display:flex;gap:4px}
.vbtn{border:1px solid var(--brd);background:transparent;color:var(--txt3);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:11px;transition:all .15s}
.vbtn:hover{border-color:var(--acc);color:var(--acc)}
.vbtn.on{background:linear-gradient(135deg,var(--acc),var(--acc3));border-color:transparent;color:#fff}

/* ── SONG GRID ── */
.songs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:14px;margin-bottom:20px}
.scard{
  background:var(--card);border:1px solid var(--brd);
  border-radius:14px;padding:11px;cursor:pointer;
  transition:all .22s;position:relative;overflow:hidden;user-select:none;
}
.scard:hover{
  background:var(--card2);border-color:var(--acc);
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(192,132,252,.2);
}
.scard.playing{
  border-color:var(--acc);background:var(--card2);
  box-shadow:0 0 0 1px var(--acc),0 8px 24px var(--glow);
}
.scard-art{
  width:100%;aspect-ratio:1;border-radius:10px;
  overflow:hidden;margin-bottom:10px;position:relative;
  background:var(--card3);
}
.scard-art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s}
.scard:hover .scard-art img{transform:scale(1.07)}
.scard-art-fb{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:46px;
}
.play-ov{
  position:absolute;inset:0;
  background:rgba(9,9,26,.55);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;border-radius:10px;
}
.scard:hover .play-ov,.scard.playing .play-ov{opacity:1}
.pov-btn{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--acc),var(--acc3));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;transition:transform .15s;
  box-shadow:0 4px 16px rgba(192,132,252,.5);
}
.pov-btn:hover{transform:scale(1.1)}
.scard-quick{position:absolute;top:8px;right:8px;display:flex;gap:3px;opacity:0;transition:opacity .2s;z-index:3}
.scard:hover .scard-quick{opacity:1}
.qbtn{
  width:24px;height:24px;background:rgba(9,9,26,.7);backdrop-filter:blur(4px);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;border:none;color:#fff;transition:background .15s;
}
.qbtn:hover{background:var(--acc)}
.play-badge{position:absolute;bottom:7px;left:7px;display:none;z-index:2}
.scard.playing .play-badge{display:flex}
.bars{display:flex;align-items:flex-end;gap:2px;height:12px}
.bar{width:3px;border-radius:2px;background:var(--acc);transform-origin:bottom}
.bar:nth-child(1){height:6px;animation:ba .6s ease-in-out infinite}
.bar:nth-child(2){height:11px;animation:ba .6s ease-in-out infinite .15s}
.bar:nth-child(3){height:8px;animation:ba .6s ease-in-out infinite .3s}
@keyframes ba{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
.paused .bar{animation:none;transform:scaleY(.3)}
.scard-ttl{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.scard-art2{font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.scard-dur{font-size:10px;color:var(--txt3);margin-top:3px}

/* ── SONG LIST ── */
.songs-list{display:flex;flex-direction:column;gap:3px}
.srow{
  display:flex;align-items:center;gap:11px;padding:9px 11px;
  border-radius:10px;cursor:pointer;transition:all .15s;
  border:1px solid transparent;user-select:none;
}
.srow:hover{background:var(--card);border-color:var(--brd)}
.srow.playing{background:var(--card2);border-color:var(--acc);box-shadow:0 2px 12px var(--glow)}
.srow-num{width:26px;text-align:center;font-size:12px;color:var(--txt3);flex-shrink:0}
.srow-thumb{
  width:44px;height:44px;border-radius:8px;flex-shrink:0;
  overflow:hidden;position:relative;background:var(--card3);
}
.srow-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;display:block}
.srow-thumb-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.srow-info{flex:1;min-width:0}
.srow-ttl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.srow-sub{font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.srow-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.srow-dur{font-size:11px;color:var(--txt3);min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
.row-btn{
  border:none;background:none;cursor:pointer;
  font-size:15px;color:var(--txt3);padding:4px;
  transition:all .15s;line-height:1;border-radius:5px;
}
.row-btn:hover{color:var(--txt);background:var(--card3)}
.row-btn.liked{color:var(--acc4)}
.row-btn.faved{color:var(--ylw)}

/* ── CONTEXT MENU ── */
.ctx{
  position:fixed;background:var(--card2);border:1px solid var(--brd);
  border-radius:13px;padding:6px;z-index:99999;min-width:200px;
  box-shadow:0 12px 48px rgba(0,0,0,.7);backdrop-filter:blur(12px);
}
.ctx-hd{padding:6px 12px 4px;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.ctx-item{
  display:flex;align-items:center;gap:9px;padding:8px 12px;
  border-radius:7px;cursor:pointer;font-size:13px;color:var(--txt2);transition:background .12s;
}
.ctx-item:hover{background:var(--card3);color:var(--txt)}
.ctx-sep{height:1px;background:var(--brd);margin:5px 0}

/* ── PLAYER BAR ── */
.pl-inner{display:flex;align-items:center;gap:14px}
.np{display:flex;align-items:center;gap:11px;width:250px;flex-shrink:0;min-width:0}
.np-art{
  width:52px;height:52px;border-radius:10px;
  flex-shrink:0;overflow:hidden;position:relative;background:var(--card3);
  box-shadow:0 4px 14px rgba(0,0,0,.5);
}
.np-art img{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block}
.np-art-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,var(--card2),var(--card3))}
.np-art.spin{animation:spin 12s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.np-info{min-width:0;flex:1}
.np-ttl{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.np-art2{font-size:10px;color:var(--txt3);margin-top:1px}
.np-btns{display:flex;gap:3px;flex-shrink:0}
.np-btn{border:none;background:none;cursor:pointer;font-size:16px;color:var(--txt3);padding:4px;border-radius:5px;transition:all .15s;line-height:1}
.np-btn:hover{color:var(--txt);background:var(--card3)}
.np-btn.liked{color:var(--acc4)}
.np-btn.faved{color:var(--ylw)}

.ctrls{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;max-width:600px}
.ctrl-row{display:flex;align-items:center;gap:7px}
.cbtn{
  border:none;background:none;cursor:pointer;
  color:var(--txt2);font-size:20px;
  padding:6px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;width:36px;height:36px;
}
.cbtn:hover{color:var(--txt);background:var(--card3)}
.cbtn.on{color:var(--acc)}
.cbtn.play{
  width:46px;height:46px;font-size:20px;
  background:linear-gradient(135deg,var(--acc),var(--acc3));
  color:#fff;border-radius:50%;
  box-shadow:0 4px 18px var(--glow);
}
.cbtn.play:hover{transform:scale(1.08);box-shadow:0 6px 22px var(--glow)}
.cbtn.play:active{transform:scale(.94)}
.spd-sel{
  background:var(--card);border:1px solid var(--brd);border-radius:7px;
  color:var(--txt2);padding:3px 6px;font-size:10px;cursor:pointer;outline:none;
  transition:border .2s;
}
.spd-sel:focus{border-color:var(--acc)}

.prog-row{width:100%;display:flex;align-items:center;gap:9px}
.t{font-size:10px;color:var(--txt3);min-width:34px;font-variant-numeric:tabular-nums}
.t.r{text-align:right}
.pbar{
  flex:1;height:4px;background:var(--card3);
  border-radius:3px;cursor:pointer;position:relative;
  transition:height .15s;
}
.pbar:hover{height:7px}
.pfill{
  height:100%;
  background:linear-gradient(90deg,var(--acc),var(--acc3));
  border-radius:3px;position:relative;pointer-events:none;
  transition:width .25s linear;
}
.pfill::after{
  content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;background:#fff;border-radius:50%;
  opacity:0;transition:opacity .2s;box-shadow:0 0 0 2px var(--acc);
}
.pbar:hover .pfill::after{opacity:1}

.vol-row{display:flex;align-items:center;gap:7px;width:170px;flex-shrink:0}
.vol-btn{border:none;background:none;cursor:pointer;font-size:16px;color:var(--txt2);padding:3px;transition:color .15s;line-height:1}
.vol-btn:hover{color:var(--txt)}
.vol-sl{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;background:var(--card3);border-radius:2px;outline:none;cursor:pointer;
}
.vol-sl::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;background:#fff;
  border-radius:50%;cursor:pointer;box-shadow:0 0 0 2px var(--glow);
}
.vol-sl::-moz-range-thumb{width:13px;height:13px;background:#fff;border-radius:50%;border:none}
.vol-pct{font-size:10px;color:var(--txt3);min-width:24px;text-align:right}

/* ── LYRICS PANEL ── */
.lyr-panel{
  width:250px;background:var(--bg2);border-left:1px solid var(--brd);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
}
.lyr-hd{
  padding:13px 15px;border-bottom:1px solid var(--brd);
  font-size:13px;font-weight:700;color:var(--txt);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.lyr-body{flex:1;overflow-y:auto;padding:16px 14px}
.lyr-song-card{
  text-align:center;margin-bottom:20px;
  padding-bottom:16px;border-bottom:1px solid var(--brd);
}
.lyr-thumb{
  width:88px;height:88px;border-radius:14px;
  margin:0 auto 10px;overflow:hidden;
  background:var(--card3);position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}
.lyr-thumb img{width:100%;height:100%;object-fit:cover;border-radius:14px;display:block}
.lyr-thumb-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:38px}
.lyr-song-title{font-size:13px;font-weight:700;color:var(--txt)}
.lyr-song-art{font-size:11px;color:var(--txt3);margin-top:3px}
.lyr-line{
  font-size:13px;line-height:2.1;color:var(--txt3);
  transition:all .4s;padding:2px 6px;margin:0 -6px;border-radius:6px;
}
.lyr-line.active{
  color:var(--txt);font-size:14px;font-weight:700;
  background:linear-gradient(135deg,rgba(192,132,252,.12),rgba(244,114,182,.08));
}
.lyr-line.near{color:var(--txt2)}
.lyr-empty{color:var(--txt3);font-size:13px;text-align:center;padding:50px 10px;line-height:2}

/* ── UPLOAD ── */
.upload-zone{
  border:2px dashed var(--brd);border-radius:16px;padding:38px 20px;
  text-align:center;cursor:pointer;transition:all .22s;margin-bottom:18px;
}
.upload-zone:hover{border-color:var(--acc);background:rgba(192,132,252,.04)}
.upload-zone input{display:none}
.uz-ico{font-size:52px;margin-bottom:12px}
.uz-ttl{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:5px}
.uz-sub{font-size:12px;color:var(--txt3)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:8888;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card2);border:1px solid var(--brd);
  border-radius:18px;padding:24px;width:370px;max-width:94vw;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.modal-ttl{font-size:15px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;color:var(--txt)}
.mclose{cursor:pointer;color:var(--txt3);font-size:18px;background:none;border:none;padding:3px;border-radius:5px;transition:color .15s}
.mclose:hover{color:var(--txt)}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--brd);font-size:12px;color:var(--txt2)}
.key{background:var(--card3);border:1px solid var(--brd);border-radius:5px;padding:2px 9px;font-size:10px;font-family:monospace;color:var(--acc)}
.m-input{
  width:100%;background:var(--card3);border:1px solid var(--brd);
  border-radius:10px;padding:10px 14px;color:var(--txt);
  font-size:13px;outline:none;margin-bottom:12px;transition:border .2s;
}
.m-input:focus{border-color:var(--acc)}
.m-btn{padding:9px 22px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s}
.m-acc{background:linear-gradient(135deg,var(--acc),var(--acc3));color:#fff;box-shadow:0 4px 14px var(--glow)}
.m-acc:hover{opacity:.9;transform:translateY(-1px)}
.m-sec{background:var(--card3);color:var(--txt2);border:1px solid var(--brd)}
.m-sec:hover{background:var(--card);color:var(--txt)}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--brd);font-size:12px}
.info-lbl{color:var(--txt3)}
.info-val{color:var(--txt);font-weight:600}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--card2);border:1px solid var(--brd);
  border-radius:10px;padding:9px 20px;
  font-size:12px;opacity:0;transition:all .25s;
  z-index:99990;white-space:nowrap;pointer-events:none;
  color:var(--txt);box-shadow:0 6px 24px rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-ico{font-size:56px;margin-bottom:14px;display:block}
.empty-ttl{font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.7}

/* ── RESPONSIVE ── */
@media(max-width:960px){.lyr-panel{display:none!important}}
@media(max-width:700px){.sidebar{width:195px}.np{width:170px}}
@media(max-width:560px){.sidebar{display:none}.vol-row{display:none}.np{width:auto;max-width:150px}}

/* ── LOADING SKELETON ── */
.skel{background:linear-gradient(90deg,var(--card3) 25%,var(--card2) 50%,var(--card3) 75%);background-size:200% 100%;animation:skel 1.5s ease-in-out infinite;border-radius:6px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── NOW PLAYING BG GLOW ── */
.np-glow{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  width:300px;height:80px;pointer-events:none;z-index:-1;
  background:radial-gradient(ellipse at center,var(--glow) 0%,transparent 70%);
  opacity:0;transition:opacity 1s;
}
.np-glow.on{opacity:1}

/* ── DRAG DROP ── */
.srow.drag-over{border-color:var(--acc3);background:rgba(244,114,182,.08)}
</style>

  </div>
</div>

  </div>
  <div class="content" id="content"></div>
</div>

<div class="lyr-panel" id="lyrPanel" style="display:none">

    <button class="mclose" onclick="toggleLyrics()">✕</button>
  </div>
  <div class="lyr-body" id="lyrBody">
    <div class="lyr-empty">🎶<br>Play a song to<br>see its lyrics</div>
  </div>
</div>

</div><!-- /layout -->

<!-- ════════════ PLAYER BAR ════════════ -->
<div class="player-bar">
  <div class="pl-inner">

    <!-- Now Playing -->
    <div class="np">
      <div class="np-art" id="npArt">
        <div class="np-art-fb" id="npFb">🎵</div>

      </div>
    </div>

    <!-- Controls -->
    <div class="ctrls">
      <div class="ctrl-row">
        <button class="cbtn" id="shufBtn" onclick="toggleShuffle()" title="Shuffle">🔀</button>

        <button class="cbtn play" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="cbtn" onclick="nextSong()" title="Next">⏭</button>

};

/* State */
let S = {
  curId: null,
  playing: false,
  shuffle: false,
  repeat: 0,     // 0=off 1=one 2=all
  muted: false,
  vol: 80,
  speed: 1,
  view: 'home',
  filter: 'all',
  viewMode: 'list',
  lyricsOpen: false,
  dark: true,
  search: '',
  lyrLine: 0,
  dragging: false
};

let liked    = new Set();
let faved    = new Set();
let audio    = new Audio();
let progTimer = null;
let dragIdx   = null;

/* ── AUDIO SETUP ── */
audio.volume = S.vol / 100;
audio.addEventListener('timeupdate', onTimeUpdate);
audio.addEventListener('ended',      onEnded);
audio.addEventListener('error',      () => {
  toast('⚠️ Could not load audio — try another song');
  S.playing = false; updatePlayBtn();
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totT').textContent = fmt(audio.duration);
});
audio.addEventListener('canplay', () => {
  if(S.playing) audio.play().catch(()=>{});
});

function onTimeUpdate() {
  if (S.dragging) return;
  const d = audio.duration || 0;
  const pct = d ? (audio.currentTime / d) * 100 : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('curT').textContent = fmt(audio.currentTime);
  // Sync lyrics
  if (S.lyricsOpen && S.curId) {
    const song = getS(S.curId);
    if (song && song.lyrics.length) {
      const idx = Math.min(
        Math.floor((audio.currentTime / (d || 1)) * song.lyrics.length),
        song.lyrics.length - 1
      );
      if (idx !== S.lyrLine) { S.lyrLine = idx; syncLyrLine(idx); }
    }
  }
}

function onEnded() {
  if (S.repeat === 1) { audio.currentTime = 0; audio.play(); return; }
  const list = getNavList();
  const i    = list.findIndex(s => s.id === S.curId);
  if (S.repeat === 2 || i < list.length - 1) {
    const ni = S.shuffle ? Math.floor(Math.random() * list.length) : (i + 1) % list.length;
    playSong(list[ni].id);
  } else {
    S.playing = false; updatePlayBtn(); renderContent();
  }
}

/* ── HELPERS ── */
function fmt(s) {
  s = Math.floor(s || 0);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}
function getS(id) { return DB.find(s => s.id === id); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}
function saveLS() {
  try {
    localStorage.setItem('rg_vol',  S.vol);
    localStorage.setItem('rg_th',   S.dark ? 'd' : 'l');
    localStorage.setItem('rg_lk',   JSON.stringify([...liked]));
    localStorage.setItem('rg_fv',   JSON.stringify([...faved]));
    if (S.curId) localStorage.setItem('rg_cur', S.curId);
    localStorage.setItem('rg_pls',  JSON.stringify(PLS));
  } catch(e){}
}
function loadLS() {
  try {
    const v = localStorage.getItem('rg_vol');  if (v) { S.vol = +v; document.getElementById('volSl').value = v; document.getElementById('volPct').textContent = v; audio.volume = S.vol/100; }
    const th = localStorage.getItem('rg_th');  if (th === 'l') { S.dark = false; document.body.classList.add('lm'); document.getElementById('themeBtn').textContent='☀️'; }
    const lk = localStorage.getItem('rg_lk');  if (lk) liked = new Set(JSON.parse(lk));
    const fv = localStorage.getItem('rg_fv');  if (fv) faved = new Set(JSON.parse(fv));
    const cur = localStorage.getItem('rg_cur'); if (cur) { S.curId = +cur; updateNP(); }
    const pls = localStorage.getItem('rg_pls'); if (pls) PLS = JSON.parse(pls);
  } catch(e){}
  updateCounts(); renderPLList();
}

/* ── PLAY LOGIC ── */
function playSong(id) {
  const song = getS(id); if (!song) return;
  S.curId   = id;
  S.playing = true;
  S.lyrLine = 0;

  audio.src             = song.url;
  audio.playbackRate    = S.speed;
  audio.volume          = S.muted ? 0 : S.vol / 100;
  audio.currentTime     = 0;

  document.getElementById('pFill').style.width = '0%';
  document.getElementById('curT').textContent  = '0:00';
  document.getElementById('totT').textContent  = fmt(song.dur);

  audio.play().then(() => {
    updatePlayBtn(); updateNP(); renderContent();
    if (S.lyricsOpen) renderLyrics();
    document.getElementById('npGlow').classList.add('on');
    toast('▶ ' + song.title + ' — ' + song.artist);
    saveLS();
  }).catch(err => {
    // Autoplay blocked — user must interact first
    toast('⚠️ Click ▶ to start playback');
    S.playing = false; updatePlayBtn();
  });
}

function togglePlay() {
  if (!S.curId) {
    const list = getNavList(); if (list.length) playSong(list[0].id); return;
  }
  if (S.playing) {
    audio.pause(); S.playing = false;
  } else {
    audio.play().catch(()=>{}); S.playing = true;
  }
  updatePlayBtn(); renderContent();
}

function prevSong() {
  if (!S.curId) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const list = getNavList();
  const i    = list.findIndex(s => s.id === S.curId);
  if (i > 0) playSong(list[i-1].id);
  else if (S.repeat === 2) playSong(list[list.length-1].id);
}
function nextSong() {
  if (!S.curId) return;
  const list = getNavList();
  const i    = list.findIndex(s => s.id === S.curId);
  if (S.shuffle) { playSong(list[Math.floor(Math.random()*list.length)].id); return; }
  if (i < list.length-1) playSong(list[i+1].id);
  else if (S.repeat === 2) playSong(list[0].id);
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = S.playing ? '⏸' : '▶';
}

function toggleShuffle() {
  S.shuffle = !S.shuffle;
  document.getElementById('shufBtn').classList.toggle('on', S.shuffle);
  toast(S.shuffle ? '🔀 Shuffle on' : 'Shuffle off');
}
function cycleRepeat() {
  S.repeat = (S.repeat + 1) % 3;
  const b = document.getElementById('repBtn');
  b.textContent = ['🔁','🔂','🔁'][S.repeat];
  b.classList.toggle('on', S.repeat > 0);
  toast(['No repeat','🔂 Repeat one','🔁 Repeat all'][S.repeat]);
}

/* ── SEEK ── */
function seekClick(e) {
  if (!S.curId) return;
  const r   = document.getElementById('pBar').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  audio.currentTime = pct * (audio.duration || 0);
}
function seekStart(e) {
  S.dragging = true;
  const move = ev => {
    const r   = document.getElementById('pBar').getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (ev.clientX - r.left) / r.width));
    document.getElementById('pFill').style.width = (pct*100) + '%';
    document.getElementById('curT').textContent  = fmt(pct * (audio.duration||0));
  };
  const up = ev => {
    S.dragging = false; seekClick(ev);
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

/* ── VOLUME ── */
function setVol(v) {
  S.vol = +v;
  audio.volume = S.muted ? 0 : S.vol / 100;

  document.getElementById('volIco').textContent = v == 0 ? '🔇' : v < 40 ? '🔉' : '🔊';

  if (faved.has(sid)) { faved.delete(sid); toast('Removed from Favorites'); }
  else               { faved.add(sid);    toast('⭐ Added to Favorites'); }

  document.getElementById('likedCnt').textContent = liked.size || '';

/* ── NOW PLAYING ── */
function updateNP() {
  const song = getS(S.curId);
  if (!song) return;
  document.getElementById('npTtl').textContent  = song.title;
  document.getElementById('npArt2').textContent = song.artist + ' — ' + song.album;

  const img = document.getElementById('npImg');

    img.src = song.art;

    fb.style.display  = 'none';

    img.style.display = 'none';
    fb.style.display  = 'flex';
    fb.textContent    = genreIco(song.genre);

  const nf = document.getElementById('npFav');

  nl.classList.toggle('liked', liked.has(S.curId));

function genreIco(g) {
  const m = {Classical:'🪗',Romantic:'💕',Bollywood:'🎬',Patriotic:'🇮🇳',Classic:'🎙️'};
  return m[g] || '🎵';
}

/* ── NAVIGATION ── */
function nav(view, el) {
  S.view = view;
  document.querySelectorAll('.sb-item').forEach(n => n.classList.remove('act'));
  if (el) el.classList.add('act');
  else {
    const match = document.querySelector(`[data-v="${view}"]`);
    if (match) match.classList.add('act');
  }
  renderContent();
}
function doSearch() {
  S.search = document.getElementById('searchInp').value;
  renderContent();
}

function getNavList() {
  const q = S.search.toLowerCase();
  if (S.view === 'liked')    return DB.filter(s => liked.has(s.id));
  if (S.view === 'fav')      return DB.filter(s => faved.has(s.id));
  if (S.view === 'library')  return filter(DB, q);
  if (S.view.startsWith('pl_')) {
    const k = S.view.slice(3);
    const ids = (PLS[k] && PLS[k].songs) || [];
    return filter(DB.filter(s => ids.includes(s.id)), q);
  }
  // home
  let list = DB;
  if (S.filter !== 'all') list = list.filter(s => s.genre === S.filter);
  return filter(list, q);
}
function filter(arr, q) {
  if (!q) return arr;
  return arr.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q) || s.album.toLowerCase().includes(q));
}

/* ── RENDER CONTENT ── */
function renderContent() {
  const el = document.getElementById('content');
  if (S.view === 'upload') { renderUpload(el); return; }

  const list  = getNavList();
  const viewNames = { home:'Home 🎵', library:'All Songs', liked:'❤️ Liked Songs', fav:'⭐ Favorites' };
  const ttl   = viewNames[S.view] || ('📋 ' + S.view.slice(3));
  const genres = ['all','Bollywood','Classical','Romantic','Patriotic','Classic'];

  el.innerHTML = `
    <div class="sec-hdr">
      <div class="sec-ttl">${ttl}<span class="sec-sub">${list.length} songs</span></div>
      <div class="view-tog">
        <button class="vbtn ${S.viewMode==='grid'?'on':''}" onclick="setVM('grid')">⊞ Grid</button>

    ${S.view === 'home' ? `<div class="chips">${genres.map(g=>`<div class="chip ${S.filter===g?'on':''}" onclick="setFilter('${g}')">${g==='all'?'All Genres':g}</div>`).join('')}</div>` : ''}
    ${list.length === 0 ? emptyState() : S.viewMode === 'grid' ? renderGrid(list) : renderList(list)}

}

function emptyState() {
  return `<div class="empty"><span class="empty-ico">🎵</span><div class="empty-ttl">No songs found</div><div class="empty-sub">Try a different search or genre</div></div>`;
}
function setVM(m) { S.viewMode = m; renderContent(); }
function setFilter(f) { S.filter = f; renderContent(); }

/* ── GRID ── */

/* ── DRAG & DROP ── */
function dS(e, i) { dragIdx = i; e.dataTransfer.effectAllowed = 'move'; }
function dO(e, el) { e.preventDefault(); el.classList.add('drag-over'); }
function dL(el) { el.classList.remove('drag-over'); }
function dD(e, i, el) {
  e.preventDefault(); el.classList.remove('drag-over');
  if (dragIdx === null || dragIdx === i) return;
  const list = getNavList();
  const [m] = list.splice(dragIdx, 1);
  list.splice(i, 0, m);
  dragIdx = null;
  renderContent(); toast('Reordered!');
}

/* ── UPLOAD ── */
function renderUpload(el) {
  el.innerHTML = `
    <div class="sec-ttl" style="margin-bottom:16px">📂 Upload Your Music</div>
    <div class="upload-zone" onclick="document.getElementById('fileInp').click()">
      <input type="file" id="fileInp" accept=".mp3,.wav,.ogg,.flac,.m4a,.aac" multiple onchange="handleUpload(event)">
      <div class="uz-ico">🎵</div>
      <div class="uz-ttl">Click or drop music files here</div>
      <div class="uz-sub">Supports MP3, WAV, OGG, FLAC, M4A, AAC<br>Your songs play directly — no upload needed!</div>
    </div>
    <div id="upList" class="songs-list"></div>
  `;
}

function handleUpload(e) {
  const files = [...e.target.files];
  files.forEach(f => {
    const url   = URL.createObjectURL(f);
    const name  = f.name.replace(/\.[^.]+$/, '');
    const newId = 9000 + Date.now() + Math.random();
    const ns = {
      id: newId, title: name, artist: 'My Library', album: 'Uploaded',
      year: new Date().getFullYear(), genre: 'Bollywood', dur: 0,
      art: null, url,
      lyrics: ['🎵 Your uploaded song', 'Lyrics not available for uploaded files', 'Enjoy the music!']
    };
    // Get real duration
    const tmp = new Audio(url);
    tmp.addEventListener('loadedmetadata', () => { ns.dur = tmp.duration; });
    DB.push(ns);
    // Add to upList
    const ul = document.getElementById('upList');
    if (ul) {
      const div = document.createElement('div');
      div.className = 'srow';
      div.innerHTML = `
        <div class="srow-thumb"><div class="srow-thumb-fb">🎵</div></div>
        <div class="srow-info"><div class="srow-ttl">${name}</div><div class="srow-sub">Uploaded file</div></div>
        <div class="srow-right">
          <button onclick="playSong(${newId})" style="border:none;background:linear-gradient(135deg,var(--acc),var(--acc3));color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700">▶ Play</button>
        </div>`;
      ul.appendChild(div);
    }
  });
  toast('✅ ' + files.length + ' file(s) ready to play!');
}

    <div class="lyr-song-card">
      <div class="lyr-thumb">
        ${song.art ? `<img src="${song.art}" alt="${song.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="lyr-thumb-fb" style="display:none">${genreIco(song.genre)}</div>` : `<div class="lyr-thumb-fb">${genreIco(song.genre)}</div>`}
      </div>
      <div class="lyr-song-title">${song.title}</div>
      <div class="lyr-song-art">${song.artist}</div>
    </div>
    ${song.lyrics.map((l, i) => `<div class="lyr-line${i===S.lyrLine?' active':i===S.lyrLine-1||i===S.lyrLine+1?' near':''}" id="ll${i}">${l}</div>`).join('')}
  `;
}

function syncLyrLine(idx) {
  document.querySelectorAll('.lyr-line').forEach((el, i) => {
    el.className = 'lyr-line' + (i === idx ? ' active' : i === idx-1 || i === idx+1 ? ' near' : '');
  });
  const cur = document.getElementById('ll' + idx);
  if (cur) cur.scrollIntoView({ behavior:'smooth', block:'center' });
}

/* ── PLAYLISTS ── */
function renderPLList() {
  const el = document.getElementById('plList');
  el.innerHTML = Object.entries(PLS).map(([k, v]) => `
    <div class="sb-item" data-v="pl_${k}" onclick="nav('pl_${k}',this)">
      <div class="pl-dot" style="background:${v.color}"></div>${k}
      <span class="pl-badge">${(v.songs||[]).length}</span>
    </div>`).join('');
}

function openNewPL() {
  openModal('newPL');
}
function createPL(name) {
  if (!name.trim()) { toast('Enter a name'); return; }
  if (PLS[name])    { toast('Playlist already exists'); return; }
  const colors = ['#f43f5e','#a855f7','#3b82f6','#22c55e','#f59e0b','#f472b6'];
  PLS[name] = { color: colors[Object.keys(PLS).length % colors.length], songs: [] };
  renderPLList(); closeModal(); saveLS();
  toast('✅ Playlist "' + name + '" created');
}

function addToPL(plName, songId) {
  if (!PLS[plName]) return;
  if (!PLS[plName].songs.includes(songId)) {
    PLS[plName].songs.push(songId);
    toast('Added to ' + plName); saveLS(); renderPLList();
  } else { toast('Already in ' + plName); }
}

/* ── CONTEXT MENU ── */
function showCtx(e, id) {
  e.preventDefault(); e.stopPropagation();
  const song = getS(id); if (!song) return;
  const ctx  = document.getElementById('ctx');
  const plKeys = Object.keys(PLS);

  ctx.innerHTML = `
    <div class="ctx-hd">${song.title}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="playSong(${id});hideCtx()">▶ &nbsp;Play now</div>
    <div class="ctx-item" onclick="toggleLike(${id});renderContent();hideCtx()">${liked.has(id)?'💔 Remove from Liked':'❤️ Add to Liked Songs'}</div>
    <div class="ctx-item" onclick="toggleFav(${id});renderContent();hideCtx()">${faved.has(id)?'🗑 Remove from Favorites':'⭐ Add to Favorites'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-hd">Add to playlist</div>
    ${plKeys.map(k=>`<div class="ctx-item" onclick="addToPL('${k}',${id});hideCtx()">📋 ${k}</div>`).join('')}
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="openModal('info',${id});hideCtx()">ℹ️ Song info</div>
  `;

  ctx.style.display = 'block';
  let x = e.clientX + 6, y = e.clientY + 6;
  if (x + 210 > window.innerWidth)  x = e.clientX - 215;
  if (y + ctx.offsetHeight > window.innerHeight) y = e.clientY - ctx.offsetHeight;
  ctx.style.left = x + 'px'; ctx.style.top = y + 'px';
  setTimeout(() => document.addEventListener('click', hideCtx, { once:true }), 10);
}
function hideCtx() { document.getElementById('ctx').style.display = 'none'; }

/* ── MODAL ── */
function openModal(type, id) {
  const bg  = document.getElementById('modalBg');
  const box = document.getElementById('modalBox');
  bg.classList.add('open');

  if (type === 'shortcuts') {
    box.innerHTML = `
      <div class="modal-ttl">⌨️ Keyboard Shortcuts <button class="mclose" onclick="closeModal()">✕</button></div>
      ${[
        ['Play / Pause','Space'],['Next','→'],['Previous','←'],
        ['Volume Up','↑'],['Volume Down','↓'],['Mute','M'],
        ['Shuffle','S'],['Like current','L'],['Favorite current','F'],
        ['Close','Esc']
      ].map(([a,k])=>`<div class="sc-row"><span>${a}</span><span class="key">${k}</span></div>`).join('')}
    `;
  } else if (type === 'newPL') {
    box.innerHTML = `
      <div class="modal-ttl">✨ New Playlist <button class="mclose" onclick="closeModal()">✕</button></div>
      <input class="m-input" id="plNameInp" placeholder="Playlist name…" maxlength="30">
      <div style="display:flex;gap:9px;justify-content:flex-end">
        <button class="m-btn m-sec" onclick="closeModal()">Cancel</button>
        <button class="m-btn m-acc" onclick="createPL(document.getElementById('plNameInp').value)">Create</button>
      </div>`;
    setTimeout(() => document.getElementById('plNameInp').focus(), 80);
  } else if (type === 'info' && id) {
    const s = getS(id); if (!s) return;
    box.innerHTML = `
      <div class="modal-ttl">ℹ️ Song Info <button class="mclose" onclick="closeModal()">✕</button></div>
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:18px">
        <div style="width:72px;height:72px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--card3);position:relative">
          ${s.art ? `<img src="${s.art}" style="width:100%;height:100%;object-fit:cover;border-radius:12px" onerror="this.style.display='none'">` : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px">${genreIco(s.genre)}</div>`}
        </div>
        <div><div style="font-size:16px;font-weight:800;color:var(--txt)">${s.title}</div><div style="font-size:12px;color:var(--txt3);margin-top:3px">${s.artist}</div></div>
      </div>
      ${[['Album',s.album],['Year',s.year],['Genre',s.genre],['Duration',fmt(s.dur)],['Liked',liked.has(s.id)?'❤️ Yes':'No'],['Favorited',faved.has(s.id)?'⭐ Yes':'No']].map(([l,v])=>`<div class="info-row"><span class="info-lbl">${l}</span><span class="info-val">${v}</span></div>`).join('')}
      <div style="display:flex;gap:9px;margin-top:16px">
        <button class="m-btn m-acc" style="flex:1" onclick="playSong(${id});closeModal()">▶ Play</button>
        <button class="m-btn m-sec" style="flex:1" onclick="toggleLike(${id});openModal('info',${id})">
          ${liked.has(id)?'💔 Unlike':'❤️ Like'}
        </button>
      </div>`;
  }
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

/* ── THEME ── */
function toggleTheme() {
  S.dark = !S.dark;
  document.body.classList.toggle('lm', !S.dark);
  document.getElementById('themeBtn').textContent = S.dark ? '🌙' : '☀️';
  saveLS(); toast(S.dark ? '🌙 Dark mode' : '☀️ Light mode');
}

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  switch (e.key) {
    case ' ':         e.preventDefault(); togglePlay();    break;
    case 'ArrowRight':e.preventDefault(); nextSong();      break;
    case 'ArrowLeft': e.preventDefault(); prevSong();      break;
    case 'ArrowUp':
      e.preventDefault();
      { const sl = document.getElementById('volSl'); sl.value = Math.min(100, +sl.value+5); setVol(sl.value); }
      break;
    case 'ArrowDown':
      e.preventDefault();
      { const sl = document.getElementById('volSl'); sl.value = Math.max(0,  +sl.value-5); setVol(sl.value); }
      break;
    case 'm': case 'M': toggleMute();    break;
    case 's': case 'S': toggleShuffle(); break;
    case 'l': case 'L': toggleLike();    break;
    case 'f': case 'F': toggleFav();     break;
    case 'Escape': closeModal(); hideCtx(); break;
  }
});

/* ── INIT ── */
loadLS();
renderContent();
renderPLList();

// If returning user has a saved song, show its info
if (S.curId) updateNP();

// If no song selected yet, prime the first one
if (!S.curId && DB.length) {
  S.curId = DB[0].id;
  updateNP();
}

</script>
